name: build

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-26.04, ubuntu-26.04-arm, macOS-26, windows-2025, windows-11-arm]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Checkout IDA SDK 9
      uses: actions/checkout@v6
      with:
        repository: HexRaysSA/ida-sdk
        ref: v9.4.0-release
        path: build/idasdk

    - name: Set up MSVC
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}

    - name: Install CMake and Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~4.4.0"
        ninjaVersion: "~1.13.1"

    - name: Configure CMake
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: |
        cmake "${GITHUB_WORKSPACE}" -G Ninja \
          "-DCMAKE_BUILD_TYPE=${BUILD_TYPE}" \
          -DFETCHCONTENT_FULLY_DISCONNECTED=ON \
          "-DFETCHCONTENT_SOURCE_DIR_IDASDK=${GITHUB_WORKSPACE}/build/idasdk"

    - name: Build
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: cmake --build . --config "${BUILD_TYPE}"

    - name: Archive artifacts
      uses: actions/upload-artifact@v6
      with:
        name: idaidle-${{ matrix.os }}
        path: ${{ github.workspace }}/build/idaidle.*

